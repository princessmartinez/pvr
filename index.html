<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="pics/favicon.jpg" type="image/png">

</head>

<body>
    <header>
        <div class="logo">
            <img src="pics/favicon.jpg" alt="Logo">
        </div>
        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav class="navbar">

            <ul class="nav">
                <li class="nav-item"><a class="active" href="#" data-section="gallery-section">Gallery</a></li>
                <li class="nav-item"><a href="#" data-section="map-section">Map</a></li>
                <li class="nav-item"><a href="#" data-section="weather-section">Weather</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="gallery-section" class="section">
            <h1>Random Gallery</h1>
            <div class="grid">
                <div class="item">
                    <img src="pics/image1.jpg" alt="Gallery image">
                </div>
                <div class="item item--large">
                    <img src="pics/image2.jpg" alt="Gallery image">
                </div>
                <div class="item item--medium">
                    <img src="pics/image3.jpg" alt="Gallery image">
                </div>
                <div class="item item--large">
                    <img src="pics/image4.jpg" alt="Gallery image">
                </div>
                <div class="item item--full">
                    <img src="pics/image5.jpg" alt="Gallery image">
                </div>
                <div class="item item--medium">
                    <img src="pics/image1.jpg" alt="Gallery image">
                </div>
                <div class="item item--large">
                    <img src="pics/image2.jpg" alt="Gallery image">
                </div>
                <div class="item">
                    <img src="pics/image3.jpg" alt="Gallery image">
                </div>
                <div class="item item--medium">
                    <img src="pics/image4.jpg" alt="Gallery image">
                </div>
                <div class="item item--large">
                    <img src="pics/image5.jpg" alt="Gallery image">
                </div>
                <div class="item">
                    <img src="pics/image1.jpg" alt="Gallery image">
                </div>
                <div class="item item--medium">
                    <img src="pics/image2.jpg" alt="Gallery image">
                </div>
                <div class="item item--medium">
                    <img src="pics/image3.jpg" alt="Gallery image">
                </div>
                <div class="item item--large">
                    <img src="pics/image4.jpg" alt="Gallery image">
                </div>
                <div class="item">
                    <img src="pics/image5.jpg" alt="Gallery image">
                </div>
                <div class="item">
                    <img src="pics/image6.png" alt="">
                </div>
                <div class="item">
                    <img src="pics/image.png" alt="">
                </div>

                <!-- want to add more pictures

                Just coppy below and change the picture name

                <div class="item">
                    <img src="pics/image.png" alt="">
                </div>

                put below
                -->

                <div class="item">
                    <img src="pics/OIP (7).jpg" alt="">
                </div>

            </div>
        </section>

        <section id="map-section" style="display: none;">
            <h1 class="map-id">Location Map</h1>
            <div class="map-section-container">
                <div class="map-search">
                    <input type="text" id="map-input" placeholder="Enter location name...">
                    <button id="map-search-btn">Show on Map</button>
                    <button id="my-location-btn">My Location</button>
                </div>
                <div class="church-dropdown-container">
                    <select id="church-dropdown">
                        <option value="">Cagayan Churches</option>
                        <option value="17.6133,121.7270">1. St. Ignatius Cathedral, Tuguegarao</option>
                        <option value="17.6162,121.7269">2. St. Peter Paul Parish Church, Tuguegarao</option>
                        <option value="17.7411,121.4543">3. Our Lady of the Pillar Church, Tuao</option>
                        <option value="18.3566,121.6406">4. San Sebastian Cathedral, Aparri</option>
                        <option value="17.9631,121.7543">5. St. John the Baptist Church, Gattaran</option>
                        <option value="17.6436,121.7876">6. St. James the Greater Church, Solana</option>
                        <option value="17.9328,121.7931">7. St. Joseph Church, Baggao</option>
                        <option value="19.2639,121.4801">8. Our Lady of La Naval, Calayan</option>
                        <option value="18.4379,121.4406">9. St. Vincent Ferrer Church, Abulug</option>
                        <option value="17.7466,121.7382">10. St. Augustine Church, Iguig</option>
                        <option value="18.2042,121.9363">11. St. Michael the Archangel Church, Lal-lo</option>
                        <option value="18.0919,121.7752">12. San Lorenzo Ruiz Church, Claveria</option>
                        <option value="17.8231,121.8455">13. St. Nicholas Church, Camalan</option>
                        <option value="17.6878,121.6924">14. St. Francis of Assisi Church, Enrile</option>
                        <option value="17.4504,121.7989">15. St. Rose of Lima Church, San Mariano</option>
                        <option value="18.2833,121.5167">16. St. James Parish Church, Allacapan</option>
                        <option value="18.0638,121.6275">17. Our Lady of Guadalupe Church, Lasam</option>
                        <option value="17.7869,121.4802">18. St. Anthony of Padua Church, Piat</option>
                        <option value="17.5469,121.7008">19. St. Jerome Church, Rizal</option>
                        <option value="18.2042,121.9363">20. Immaculate Conception Cathedral, Lallo</option>
                    </select>
                </div>
                <div id="main-map-container" class="map-container">
                    <iframe id="main-map-iframe" width="100%" height="500" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
                <div class="church-info" id="church-info" style="display: none;">
                    <h2 id="church-name"></h2>
                    <div id="church-image-container" style="background: linear-gradient(135deg, #0c9a9a, #087878); width: 100%; height: 300px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px;">
                        <img id="church-image" style="max-width: 100%; max-height: 300px; border-radius: 8px;" alt="Church Image">
                    </div>
                    <p id="church-history"></p>
                </div>
            </div>
        </section>

        <section id="weather-section" style="display: none;">
            <h1 class="weather-id">Weather</h1>
            <div class="weather-container">

                <div class="weather-display" id="weather-display">
                    <div class="weather-card">
                        <h2 id="city-name">--</h2>
                        <div class="weather-icon" id="weather-icon">--</div>
                        <div class="temperature" id="temperature">--°C</div>
                        <div class="description" id="description">--</div>
                        <div class="details">
                            <div class="detail-item">
                                <span>Humidity</span>
                                <span id="humidity">--%</span>
                            </div>
                            <div class="detail-item">
                                <span>Wind</span>
                                <span id="wind">-- m/s</span>
                            </div>
                            <div class="detail-item">
                                <span>Pressure</span>
                                <span id="pressure">-- hPa</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="forecast-section">
                    <h3>24-Hour Forecast</h3>
                    <div class="forecast-container" id="forecast-container">
                        <!-- Forecast items will be added here dynamically -->
                    </div>
                </div>
            </div>
        </section>

        <div id="fullscreen" class="fullscreen">
            <button class="fullscreen-close">&times;</button>
            <img id="fullscreen-img" src="" alt="Fullscreen">
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
